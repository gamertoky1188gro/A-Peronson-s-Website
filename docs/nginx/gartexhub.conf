worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/Users/tokyi/AppData/Local/Microsoft/WinGet/Packages/freenginx.nginx_Microsoft.Winget.Source_8wekyb3d8bbwe/freenginx-1.29.6/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    error_log  C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/logs/error.log;
    access_log C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/logs/access.log;

    client_body_temp_path C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/temp/client_body_temp;
    proxy_temp_path       C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/temp/proxy_temp;
    fastcgi_temp_path     C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/temp/fastcgi_temp;
    scgi_temp_path        C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/temp/scgi_temp;
    uwsgi_temp_path       C:/Users/tokyi/OneDrive/Desktop/meow/docs/nginx/temp/uwsgi_temp;

    server {
        listen 80;
        server_name _;

        # Frontend (Vite preview)
        location / {
            proxy_pass http://127.0.0.1:4173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # API reverse proxy
        location /api/ {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # Uploads (static files served by backend)
        location /uploads/ {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # WebSocket reverse proxy
        location /ws {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60m;
        }
    }
}
